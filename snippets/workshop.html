<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NetSnapz — Snippet Workshop</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="stylesheet" href="../style.css"/>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: #f4f4f6; display: flex; }

  /* ── Finder-style sidebar — same pattern as index.html's browser ── */
  .workshop-sidebar {
    flex: none; width: 232px; height: 100%; overflow-y: auto;
    background: #fafafa; border-right: 1px solid #e5e5e5; padding: 18px 0 24px;
  }
  .sidebar-title {
    padding: 0 20px 12px;
    font: 11px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: #999;
  }
  .sidebar-item {
    display: flex; flex-direction: column; gap: 3px; width: 100%; text-align: left;
    padding: 9px 20px; border: 0; background: transparent; color: #333; cursor: pointer;
    border-left: 3px solid transparent; transition: background 0.12s ease, border-color 0.12s ease;
  }
  .sidebar-item:hover { background: #f0f0f0; }
  .sidebar-item.is-active { background: #fff; border-left-color: #1c1c1e; }
  .sidebar-item .item-name {
    font: 700 14px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -0.01em;
  }
  .sidebar-item .item-file {
    font: 11px/1.3 ui-monospace, "SF Mono", Menlo, Consolas, monospace; color: #999;
  }

  /* ── Main workshop column ── */
  .workshop-main { flex: 1 1 auto; min-width: 0; height: 100%; overflow-y: auto; display: flex; flex-direction: column; }
  /* #workshopBody is where each snippet's content gets rebuilt — it must be
     part of the flex-stretch chain too, otherwise .device-row's "fill the
     remaining space" has nothing definite to stretch into and collapses to
     its content's minimum height (the squashed-pane bug). */
  #workshopBody { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }

  .preview-bar {
    position: sticky; top: 0; z-index: 50; flex: none;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 14px 24px; background: #1c1c1e; color: #fff;
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .preview-bar-actions { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; }
  .preview-bar-title { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
  .preview-bar-title .name { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .preview-bar-title .desc { color: #aaa; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .copy-btn {
    flex: 0 0 auto; display: inline-flex; align-items: center; gap: 7px;
    background: #2c2c2e; color: #fff; border: 1px solid #3a3a3c;
    border-radius: 7px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.15s ease, transform 0.1s ease;
  }
  .copy-btn:hover { background: #3a3a3c; }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn svg { width: 15px; height: 15px; flex: none; }
  .copy-btn.copied { background: #1f7a3d; border-color: #1f7a3d; }

  /* ── Device comparison panes ── */
  .device-row {
    flex: 1 1 auto; min-height: 0;
    margin: 0 auto; padding: 22px 24px 28px; width: 100%;
    display: flex; gap: 28px; flex-wrap: wrap; justify-content: center;
  }
  .device-pane {
    display: flex; flex-direction: column;
    background: #fff; border-radius: 18px; overflow: hidden;
    box-shadow: 0 18px 46px -14px rgba(0,0,0,0.28), 0 4px 14px rgba(0,0,0,0.07);
  }
  .device-pane.is-desktop { flex: 75 1 480px; min-width: 420px; }
  .device-pane.is-mobile  { flex: 25 1 300px; min-width: 280px; }
  .device-pane-head { padding: 22px 16px 6px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .slider-wrap { position: relative; padding-top: 22px; }
  .slider-label {
    position: absolute; top: 0; transform: translateX(-50%);
    font-size: 11px; font-weight: 700; color: #fff; background: #1c1c1e;
    padding: 3px 8px; border-radius: 5px; white-space: nowrap; pointer-events: none;
  }
  .slider-label::after {
    content: ""; position: absolute; left: 50%; bottom: -4px; transform: translateX(-50%);
    border: 4px solid transparent; border-top-color: #1c1c1e;
  }
  input[type="range"] {
    width: 100%; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px; background: #ddd; outline: none; display: block;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; border: 2px solid #1c1c1e; cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.35);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; border: 2px solid #1c1c1e; cursor: pointer;
  }
  .device-pane-body {
    flex: 1 1 auto; min-height: 0; overflow: hidden;
    background: repeating-linear-gradient(45deg, #ececef 0 12px, #e5e5e9 12px 24px);
    display: flex; justify-content: center; align-items: stretch; padding: 22px;
  }
  .device-pane-body iframe {
    flex: none; max-width: 100%; height: 100%;
    border: 0; border-radius: 10px; display: block; background: #fff;
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
  }

  /* ── Live CSS editor (per pane) ── */
  .css-editor-wrap { flex: none; border-top: 1px solid #ececec; background: #fafafa; display: flex; flex-direction: column; }
  .css-editor-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; font: 11px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #888; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700;
  }
  .css-editor-bar .copy-css-btn {
    flex: none; border: 1px solid #ddd; background: transparent; color: #888;
    font: 11px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.04em; text-transform: none; font-weight: 600;
    cursor: pointer; padding: 3px 8px; border-radius: 5px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .css-editor-bar .copy-css-btn:hover { background: #ececec; color: #333; }
  .css-editor-bar .copy-css-btn.copied { background: #1f7a3d; color: #fff; border-color: #1f7a3d; }
  .css-editor-shell { position: relative; flex: none; height: 476px; border-top: 1px solid #ececec; }
  /* Line-number gutter — purely visual reference for locating the same rule
     in styles.css; numbers are generated from the textarea's own line count
     (1-based) and its scroll is kept in lockstep with the editor/highlight. */
  .css-gutter {
    position: absolute; inset: 0 auto 0 0; width: 38px; margin: 0; padding: 10px 0;
    box-sizing: border-box; overflow: hidden; text-align: right;
    font: 14px/1.6 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: #5a5a5e; background: #1c1c1e; border-right: 1px solid #2e2e31;
    user-select: none; pointer-events: none; z-index: 0;
  }
  .css-gutter div { padding: 0 8px 0 0; }
  .css-highlight, .css-editor {
    position: absolute; top: 0; right: 0; bottom: 0; left: 38px; margin: 0; padding: 10px 14px;
    box-sizing: border-box; overflow: auto; white-space: pre-wrap; word-wrap: break-word;
    font: 14px/1.6 ui-monospace, "SF Mono", Menlo, Consolas, monospace; tab-size: 2;
  }
  .css-highlight { color: #d4d4d8; background: #1c1c1e; pointer-events: none; z-index: 0; }
  .css-highlight code { font: inherit; }
  .css-editor { z-index: 1; border: 0; outline: none; resize: none; background: transparent; color: transparent; caret-color: #fff; }
  .css-editor::placeholder { color: #6b6b6e; }
  .tok-selector  { color: #c5a3ff; }
  .tok-at        { color: #c792ea; font-weight: 600; }
  .tok-cond      { color: #89ddff; }
  .tok-prop      { color: #80cbc4; }
  .tok-value     { color: #f78c6c; }
  .tok-important { color: #ff5370; font-weight: 700; }
  .tok-punct     { color: #6b6b6e; }
  .tok-comment   { color: #6b6b6e; font-style: italic; }
  .tok-srcline   { color: #9be29b; font-style: italic; }

  /* ── Fallback message for snippets without an isolated live preview ── */
  .no-preview {
    flex: 1 1 auto; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 40px;
  }
  .no-preview-card {
    max-width: 440px; background: #fff; border-radius: 16px; padding: 28px 32px;
    box-shadow: 0 18px 46px -14px rgba(0,0,0,0.18);
    font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #555;
  }
  .no-preview-card h2 { margin: 0 0 10px; font-size: 17px; color: #222; }
  .no-preview-card a { color: #2563eb; font-weight: 600; text-decoration: none; }
  .no-preview-card a:hover { text-decoration: underline; }

  @media (max-width: 880px) {
    .device-row { flex: none; }
    .device-pane-body { min-height: 380px; }
  }
</style>
</head>
<body>

  <!-- ══════════ Sidebar — click a snippet to load it on the right ══════════ -->
  <nav class="workshop-sidebar" aria-label="Snippet workshop browser">
    <div class="sidebar-title">Snippets</div>
    <button class="sidebar-item" data-snippet="service-slider" type="button">
      <span class="item-name">Service Slider</span>
      <span class="item-file">service-slider.html</span>
    </button>
    <button class="sidebar-item" data-snippet="hero-cone" type="button">
      <span class="item-name">hero-cone</span>
      <span class="item-file">hero-cone.html</span>
    </button>
    <button class="sidebar-item" data-snippet="swoosh-cards" type="button">
      <span class="item-name">Swoosh Cards</span>
      <span class="item-file">swoosh-cards.html</span>
    </button>
    <button class="sidebar-item" data-snippet="feature-row" type="button">
      <span class="item-name">feature-row</span>
      <span class="item-file">feature-row.html</span>
    </button>
    <button class="sidebar-item" data-snippet="story-canvas" type="button">
      <span class="item-name">story-canvas</span>
      <span class="item-file">story-canvas.html</span>
    </button>
    <button class="sidebar-item" data-snippet="slider" type="button">
      <span class="item-name">slider</span>
      <span class="item-file">slider.html</span>
    </button>
    <button class="sidebar-item" data-snippet="header" type="button">
      <span class="item-name">header</span>
      <span class="item-file">header.html</span>
    </button>
    <button class="sidebar-item" data-snippet="footer" type="button">
      <span class="item-name">footer</span>
      <span class="item-file">footer.html</span>
    </button>
  </nav>

  <!-- ══════════ Main: bar + dual-pane device editor (rebuilt per snippet) ══════════ -->
  <main class="workshop-main">
    <div class="preview-bar">
      <div class="preview-bar-title">
        <span class="name" id="barName">hero-cone</span>
        <span class="desc" id="barDesc">Hero with the "cone drop" entrance animation</span>
      </div>
      <div class="preview-bar-actions">
        <button class="copy-btn" id="refreshBtn" type="button" title="Reload this snippet's preview (resets live CSS edits)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          <span class="label">Refresh</span>
        </button>
        <button class="copy-btn" id="copyBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span class="label">Copy code</span>
        </button>
      </div>
    </div>
    <div id="workshopBody"></div>
  </main>

  <!-- ============ SNIPPET SOURCES — registry of what the workshop can load ============ -->
  <template id="tmpl-swoosh-cards">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f2f2f2; padding: 48px 24px 80px; }
      @keyframes swooshLeft {
        from { opacity: 0; transform: translateX(-110vw); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes swooshRight {
        from { opacity: 0; transform: translateX(110vw); }
        to   { opacity: 1; transform: translateX(0); }
      }
      .cards { display: flex; flex-direction: column; gap: 20px; max-width: 800px; margin: 0 auto; }
      .card {
        display: grid; grid-template-columns: 1fr 1fr;
        border-radius: 4px; overflow: hidden;
        border: 1.5px solid #e0e0e0; background: #fff;
        opacity: 0;
      }
      .card.is-visible       { animation: swooshLeft  1.1s cubic-bezier(0.16,1,0.3,1) forwards; }
      .card.reverse.is-visible { animation: swooshRight 1.1s cubic-bezier(0.16,1,0.3,1) forwards; }
      .card-img { background: #d0d0d0; min-height: 200px; display: flex; align-items: center; justify-content: center; color: #999; font-size: 13px; }
      .card.reverse .card-img { order: 2; }
      .card.reverse .card-info { order: 1; }
      .card-info { padding: 32px 28px; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
      .card-info h3 { font-size: 20px; font-weight: 800; color: #111; }
      .card-info p  { font-size: 14px; color: #666; line-height: 1.6; }
      .spacer { height: 60vh; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 13px; }
    </style>
    <div class="spacer">↓ scroll down to trigger swoosh ↓</div>
    <div class="cards">
      <div class="card" data-swoosh>
        <div class="card-img">Image — from LEFT</div>
        <div class="card-info"><h3>Card One</h3><p>This card swooshes in from the left as it enters the viewport.</p></div>
      </div>
      <div class="card reverse" data-swoosh>
        <div class="card-img">Image — from RIGHT</div>
        <div class="card-info"><h3>Card Two</h3><p>This card swooshes in from the right, alternating direction.</p></div>
      </div>
    </div>
    <div class="spacer"></div>
  </template>

  <template id="tmpl-hero-cone">
    <section class="hero">
      <div class="container hero-inner hero-cone">
        <div class="hero-text">
          <p class="section-label">YOUR EYEBROW / LABEL HERE</p>
          <h1>Your Headline Goes<br><span class="accent">Right Here</span></h1>
          <div class="hero-media-mobile">
            <img src="../assets/images/slider/netsnapz-snap-on-net-banner-installation-ari-heat-volleyball.jpg"
                 alt="Preview placeholder image — replace with the page's mobile hero photo" loading="lazy"/>

          <div class="hero-cta">
            <a href="#" class="btn btn-primary btn-large">Order Now →</a>
            <a href="#" class="btn btn-ghost">▶ See How It Works</a>
          </div>
          <div class="hero-trust">
            <span>✓ Trust point one</span>
            <span>✓ Trust point two</span>

        <div class="hero-image">
          <div class="hero-video-wrap">

        </div>

  <template id="tmpl-feature-row">

          </div>
        </div>
      </div>
    </section>

  <template id="tmpl-story-canvas">
    <div class="scroll-story" id="scrollStory">
      <div class="scroll-story-sticky">

        <div class="scroll-bg" id="scrollBg" role="img" aria-label="Textured background scene"
             style="background-image: url('../assets/images/backgrounds/background-gray.jpg');"></div>
        <div class="scroll-overlay"></div>

        <div class="scroll-progress-bar"><div class="scroll-progress-fill" id="scrollProgressFill"></div></div>

        <div class="scroll-cards" id="scrollCards">
          <div class="scroll-card" data-index="0">
            <div class="scroll-card-inner">
              <div class="scroll-card-tag">[Short Eyebrow Tag]</div>
              <h2>[Hook headline — the "wait, what?" moment]</h2>
              <p>[1-2 sentences expanding on the hook — the problem you solve or the differentiator you lead with.]</p>
            </div>
            <div class="scroll-card-image">
              <div class="scroll-card-img-placeholder"><img src="../assets/images/slider/netsnapz-snap-on-net-banner-installation-ari-heat-volleyball.jpg" alt="Preview placeholder — replace with real story-card photo" loading="lazy"/></div>
            </div>
          </div>
          <div class="scroll-card" data-index="1">
            <div class="scroll-card-inner">
              <div class="scroll-card-tag">[Short Eyebrow Tag]</div>
              <h2>[Headline — build out the story / show range or versatility]</h2>
              <p>[Supporting copy.]</p>
            </div>
            <div class="scroll-card-image">
              <div class="scroll-card-img-placeholder"><img src="../assets/images/slider/netsnapz-snap-on-net-boards-baseball-field-number-tournament.jpg" alt="Preview placeholder — replace with real story-card photo" loading="lazy"/></div>
            </div>
          </div>
          <div class="scroll-card" data-index="2">
            <div class="scroll-card-inner">
              <div class="scroll-card-tag">[Short Eyebrow Tag]</div>
              <h2>[Headline — proof point, use case, or audience-specific angle]</h2>
              <p>[Supporting copy.]</p>
            </div>
            <div class="scroll-card-image">
              <div class="scroll-card-img-placeholder"><img src="../assets/images/slider/netsnapz-snap-on-net-displays-multi-sponsor-volleyball-tournament.jpg" alt="Preview placeholder — replace with real story-card photo" loading="lazy"/></div>
            </div>
          </div>
          <div class="scroll-card" data-index="3">
            <div class="scroll-card-inner">
              <div class="scroll-card-tag">[Short Eyebrow Tag]</div>
              <h2>[Headline — quality / craftsmanship / what sets you apart]</h2>
              <p>[Supporting copy.]</p>
            </div>
            <div class="scroll-card-image">
              <div class="scroll-card-img-placeholder"><img src="../assets/images/slider/netsnapz-snap-on-net-panels-summit-league-tennis-championships.jpg" alt="Preview placeholder — replace with real story-card photo" loading="lazy"/></div>
            </div>
          </div>
          <div class="scroll-card" data-index="4">
            <div class="scroll-card-inner">
              <div class="scroll-card-tag">[Ready to...? / Get Started]</div>
              <h2>[Closing headline — the "now act" moment]</h2>
              <p>[Reassurance copy — turnaround time, guarantee, what happens next.]</p>
              <a href="#" class="btn btn-primary btn-large" style="margin-top:8px;">[Primary CTA Label →]</a>

  <script>
    (function () {
      // ---- Registry: what the sidebar can load -------------------------
      var REGISTRY = {
        'swoosh-cards': {
          name: 'Swoosh Cards', file: 'swoosh-cards.html',
          desc: 'Cards that swoosh in from alternating sides on scroll (IntersectionObserver + @keyframes)',
          template: 'tmpl-swoosh-cards',
          play: function (doc, win) {
            var observer = new win.IntersectionObserver(function (entries) {
              entries.forEach(function (entry) {
                if (entry.isIntersecting) entry.target.classList.add('is-visible');
              });
            }, { threshold: 0, rootMargin: '0px 0px -15% 0px' });
            doc.querySelectorAll('[data-swoosh]').forEach(function (el) { observer.observe(el); });
          }
        },
        'hero-cone': {
          name: 'hero-cone', file: 'hero-cone.html',
          desc: 'Hero with the "cone drop" entrance animation',
          template: 'tmpl-hero-cone',
          play: function (doc, win) {
            var hero = doc.querySelector('.hero');
            if (!hero) return;
            win.requestAnimationFrame(function () {
              win.requestAnimationFrame(function () { hero.classList.add('hero-play'); });
            });
          }
        },
        'feature-row': {
          name: 'feature-row', file: 'feature-row.html',
          desc: 'Image + copy section · parallax · scroll reveal · mobile text-shortening',
          template: 'tmpl-feature-row',
          play: function (doc, win) {
            var section = doc.querySelector('.section');
            if (!section) return;

            // Verbatim port of the reveal-observer + parallax pair documented
            // in feature-row.preview.html (the snippet's own "copy these two
            // scripts alongside it" reference) — just re-targeted at this
            // iframe's `doc`/`win` instead of the global document/window, so
            // the exact same scroll-driven behavior plays inside the pane.
            // It needs scroll room to trigger, so add a spacer above/below.
            var spacerTop = doc.createElement('div');
            spacerTop.textContent = '↓ scroll to trigger the reveal + parallax ↓';
            spacerTop.style.cssText =
              'height:70vh; display:flex; align-items:center; justify-content:center;' +
              'color:#aaa; font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;';
            section.parentNode.insertBefore(spacerTop, section);

            var spacerBottom = doc.createElement('div');
            spacerBottom.style.height = '60vh';
            section.parentNode.appendChild(spacerBottom);

            // ---- Reveal observer (verbatim from feature-row.preview.html) ----
            var targets = [];
            doc.querySelectorAll('.section').forEach(function (el) {
              el.classList.add('slide-up');
              targets.push(el);
            });
            doc.querySelectorAll('.feature-media').forEach(function (el, i) {
              el.classList.add(i % 2 === 0 ? 'slide-in-right' : 'slide-in-left');
              targets.push(el);
            });
            if (targets.length) {
              var io = new win.IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                  if (entry.isIntersecting) {
                    entry.target.classList.add('in-view');
                    io.unobserve(entry.target);
                  }
                });
              }, { threshold: 0.05, rootMargin: '0px 0px -40px 0px' });
              targets.forEach(function (el) { io.observe(el); });
            }

            // ---- Parallax drift (verbatim from feature-row.preview.html) ----
            var medias = Array.prototype.slice.call(doc.querySelectorAll('.feature-media'));
            if (medias.length) {
              var imgs = medias.map(function (el) { return el.querySelector('img'); });
              function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }
              var ticking = false;
              function update() {
                var winH = win.innerHeight;
                medias.forEach(function (el, i) {
                  var img = imgs[i];
                  if (!img) return;
                  var rect = el.getBoundingClientRect();
                  var p = clamp((winH - rect.top) / (winH + rect.height), 0, 1);
                  var maxShiftPct = rect.height < 340 ? 22 : 16;
                  var shift = -(maxShiftPct * p);
                  img.style.transform = 'translateY(' + shift.toFixed(2) + '%)';
                });
                ticking = false;
              }
              function onScroll() {
                if (!ticking) { ticking = true; win.requestAnimationFrame(update); }
              }
              update();
              win.addEventListener('scroll', onScroll, { passive: true });
              win.addEventListener('resize', onScroll);
            }
          }
        },
        'story-canvas': {
          name: 'story-canvas', file: 'story-canvas.html',
          desc: 'Full-bleed sticky scroll-card stack — scroll-driven narrative + progress bar/counter',
          template: 'tmpl-story-canvas',
          play: function (doc, win) {
            // Verbatim port of the ~150-line scroll-math engine documented in
            // story-canvas.html (search main.js for `getElementById('scrollStory')`,
            // ~lines 480-643) — retargeted from `document`/`window` to this
            // iframe's `doc`/`win` so the exact same pinned-scroll card-stack
            // sequencing plays inside the pane. `.scroll-story` is natively
            // 775vh tall (see style.css), so no extra scroll-room spacers
            // are needed — just scroll the pane itself.
            var story    = doc.getElementById('scrollStory');
            var bg       = doc.getElementById('scrollBg');
            var cards    = Array.prototype.slice.call(doc.querySelectorAll('.scroll-card'));
            var fill     = doc.getElementById('scrollProgressFill');
            var countCur = doc.getElementById('scrollCountCurrent');
            var countTot = doc.getElementById('scrollCountTotal');
            if (!story || !cards.length) return;

            // The engine deliberately keeps the LAST card on screen forever
            // (`exitFrac` returns 0 for `i === N-1`) — on the live page the
            // section simply hands off to whatever comes next. There's
            // nothing after `.scroll-story` in this isolated preview, so add
            // a spacer to scroll into — that's what lets you keep scrolling
            // past the pinned section and watch the hand-off/release timing
            // (the sticky card stack un-pins and scrolls away normally).
            var spacerBottom = doc.createElement('div');
            spacerBottom.textContent = '↓ section released — this is the hand-off to whatever comes next ↓';
            spacerBottom.style.cssText =
              'height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:0 40px; box-sizing:border-box;' +
              'color:#aaa; font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;';
            story.parentNode.appendChild(spacerBottom);

            var N = cards.length;
            if (countTot) countTot.textContent = N;

            var stickyEl = story.querySelector('.scroll-story-sticky');

            var hint = doc.createElement('div');
            hint.className = 'scroll-hint';
            hint.innerHTML = '<span class="scroll-hint-arrow">↓</span><span>Scroll</span>';
            stickyEl.appendChild(hint);

            function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }
            function easeInQuad(t)  { return t * t; }
            function lerp(a, b, t)  { return a + (b - a) * t; }
            function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

            // Shared with sizeBg() below — the bg sits `top: -maxBgDrift` so its
            // drift (translateY, capped at this same value) never lets its top
            // edge scroll into view. `update()` needs to clamp to this same
            // number when computing the live drift (see fix note inside update).
            var maxBgDrift = 0;

            var SLOTS  = 2 * (N - 1);
            var slotSz = 1 / SLOTS;

            function enterFrac(i, p) {
              if (i === 0) return 1;
              var start = (2 * i - 1) * slotSz;
              return clamp((p - start) / slotSz, 0, 1);
            }
            function exitFrac(i, p) {
              if (i === N - 1) return 0;
              var start = (2 * i + 1) * slotSz;
              return clamp((p - start) / slotSz, 0, 1);
            }

            function update() {
              var rect     = story.getBoundingClientRect();
              var winH     = win.innerHeight;
              var stickyH  = stickyEl.offsetHeight || winH;
              var earlyStart = winH * 0.4;
              var scrolled = Math.max(0, -rect.top + earlyStart);
              var scrollable = story.offsetHeight - stickyH;
              var dwellExtraVh = 75;
              var dwellExtraPx = (dwellExtraVh / 100) * winH;
              var activeScrollable = Math.max(1, scrollable - dwellExtraPx);
              var p = clamp(scrolled / activeScrollable, 0, 1);

              if (fill) fill.style.width = (p * 100) + '%';
              if (bg) {
                // FIX (beyond the verbatim main.js port): `scrolled` includes
                // the `earlyStart` head-start bonus (so the section "wakes up"
                // slightly before its top reaches the viewport), which can push
                // `scrolled * 0.08` past `maxBgDrift` — the exact distance the
                // bg was shifted up via `top: -maxBgDrift` in sizeBg(). Past
                // that point the bg's drift overshoots its `top` offset and its
                // own top edge scrolls into view, exposing whatever's behind it.
                // Clamping the drift to `maxBgDrift` keeps the image's top edge
                // pinned at the viewport's top edge at most — never past it.
                bg.style.transform = 'translateY(' + Math.min(scrolled * 0.08, maxBgDrift) + 'px)';
                bg.style.opacity = Math.min(1, p / 0.3);
              }

              var displayCard = 0;
              for (var i = N - 1; i >= 0; i--) {
                if (enterFrac(i, p) > 0) { displayCard = i; break; }

      }
      function highlightCss(text) { return text.split('\n').map(highlightCssLine).join('\n'); }

      // ---- Build one device pane (iframe + slider + CSS editor) --------
      function buildPane(opts) {
        var pane = document.createElement('div');
        pane.className = 'device-pane is-' + opts.kind;
        pane.innerHTML =
          '<div class="device-pane-head"><div class="slider-wrap">' +
            '<span class="slider-label">' + opts.width + 'px</span>' +
            '<input type="range" min="' + opts.min + '" max="' + opts.max + '" step="' + opts.step + '" value="' + opts.width + '">' +
          '</div></div>' +
          '<div class="device-pane-body"></div>' +
          '<div class="css-editor-wrap">' +
            '<div class="css-editor-bar"><span>Live CSS — ' + opts.kind + ' pane</span>' +
              '<button class="copy-css-btn" type="button">Copy CSS</button></div>' +
            '<div class="css-editor-shell">' +
              '<div class="css-gutter" aria-hidden="true"></div>' +
              '<pre class="css-highlight" aria-hidden="true"><code></code></pre>' +
              '<textarea class="css-editor" spellcheck="false" placeholder="' + opts.placeholder + '"></textarea>' +
            '</div>' +
          '</div>';

        var slider = pane.querySelector('input[type="range"]');
        var label  = pane.querySelector('.slider-label');
        var body   = pane.querySelector('.device-pane-body');
        var ta     = pane.querySelector('.css-editor');
        var hl     = pane.querySelector('.css-highlight');
        var hlCode = hl.querySelector('code');
        var gutter = pane.querySelector('.css-gutter');
        var copyCssBtn = pane.querySelector('.copy-css-btn');

        var iframe = document.createElement('iframe');
        iframe.style.width = opts.width + 'px';
        iframe.srcdoc =
          '<!DOCTYPE html><html><head><meta charset="utf-8">' +
          '<meta name="viewport" content="width=device-width, initial-scale=1">' +
          '<link rel="stylesheet" href="../style.css">' +
          '<style>body{margin:0;}</style><style id="live-overrides"></style>' +
          '</head><body></body></html>';
        body.appendChild(iframe);

        var pendingCss = '';
        function applyCss() {
          var doc = iframe.contentDocument;
          if (!doc) return;
          var tag = doc.getElementById('live-overrides');
          if (tag) tag.textContent = pendingCss;
        }
        iframe.addEventListener('load', function () {
          var doc = iframe.contentDocument, win = iframe.contentWindow;
          currentRootEls.forEach(function (el) { doc.body.appendChild(doc.importNode(el, true)); });
          applyCss();
          if (opts.play) opts.play(doc, win);
        });

        function reposition() {
          var min = parseFloat(slider.min), max = parseFloat(slider.max), val = parseFloat(slider.value);
          var percent = (val - min) / (max - min), thumb = 16, track = slider.offsetWidth;
          label.style.left = (thumb / 2 + percent * (track - thumb)) + 'px';
          label.textContent = Math.round(val) + 'px';
        }
        slider.addEventListener('input', function () { iframe.style.width = slider.value + 'px'; reposition(); });
        window.addEventListener('resize', reposition);
        // Defer the first call: at this point `pane` hasn't been appended to
        // the document yet, so `slider.offsetWidth` reads as 0 and the label
        // lands near the left edge instead of over the thumb. Waiting a frame
        // lets loadSnippet() finish inserting the row first, so the slider has
        // its real layout width by the time we measure it.
        requestAnimationFrame(reposition);

        function renderGutter() {
          var n = ta.value.split('\n').length;
          var out = '';
          for (var i = 1; i <= n; i++) out += '<div>' + i + '</div>';
          gutter.innerHTML = out;
          gutter.scrollTop = ta.scrollTop;
        }
        function renderHl() {
          hlCode.innerHTML = highlightCss(ta.value) + '\n';
          hl.scrollTop = ta.scrollTop; hl.scrollLeft = ta.scrollLeft;
          renderGutter();
        }
        ta.addEventListener('scroll', function () {
          hl.scrollTop = ta.scrollTop; hl.scrollLeft = ta.scrollLeft;
          gutter.scrollTop = ta.scrollTop;
        });
        var t;
        ta.addEventListener('input', function () {
          renderHl();
          clearTimeout(t);
          t = setTimeout(function () { pendingCss = forceImportant(ta.value); applyCss(); }, 150);
        });

        var defaultCopyLabel = copyCssBtn.textContent;
        copyCssBtn.addEventListener('click', function () {
          var css = ta.value.trim();
          if (!css) return;
          navigator.clipboard.writeText(css).then(function () {
            copyCssBtn.classList.add('copied'); copyCssBtn.textContent = 'Copied!';
            setTimeout(function () { copyCssBtn.classList.remove('copied'); copyCssBtn.textContent = defaultCopyLabel; }, 1600);
          });
        });

        return {
          el: pane,
          seedCss: function (css) {
            ta.value = css;
            renderHl();
            // Deliberately DON'T push the seeded snapshot into #live-overrides
            // here. The seeded rules are copies of what's already active via
            // the linked style.css — forcing `!important` on them the moment
            // they're seeded would let them beat inline styles that a snippet's
            // own JS sets dynamically (e.g. story-canvas's scroll engine drives
            // `.scroll-card` opacity/transform via `el.style.*` every frame —
            // an `!important`-forced `opacity: 0` from the seed would pin every
            // card invisible, which is exactly the "blank pane" bug this fixes).
            // The overlay only needs to exist once the user actually edits the
            // textarea and diverges from the seed — the `input` handler below
            // already wires that up.
            pendingCss = '';
            applyCss();
          }
        };
      }

      // ---- Load a snippet into the workshop -----------------------------
      function loadSnippet(id, opts) {
        var entry = REGISTRY[id];
        if (!entry) return;
        var mySeq = ++seq;
        currentId = id;

        // Keep the URL hash in sync so a page refresh (or back/forward, or a
        // shared link) lands back on the same snippet instead of resetting to
        // the first one. replaceState avoids polluting browser history with
        // every click, and the `fromHash` flag stops the hashchange listener
        // below from looping back into another reload of the same snippet.
        if (!(opts && opts.fromHash) && location.hash.slice(1) !== id) {
          history.replaceState(null, '', '#' + id);
        }

        barName.textContent = entry.name;
        barDesc.textContent = entry.noPreview ? 'No isolated live preview — see notes' : entry.desc;
        body.innerHTML = '';
        currentRootEls = [];

        document.querySelectorAll('.sidebar-item').forEach(function (b) {
          b.classList.toggle('is-active', b.getAttribute('data-snippet') === id);
        });

        if (entry.noPreview) {
          copyBtn.style.display = 'none';
          var wrap = document.createElement('div');
          wrap.className = 'no-preview';
          wrap.innerHTML =
            '<div class="no-preview-card">' +
              '<h2>No isolated live preview for "' + entry.name + '"</h2>' +
              '<p>' + entry.reason + '</p>' +
              '<p>Open <a href="' + entry.file + '" target="_blank" rel="noopener">' + entry.file + '</a> ' +
              'for full documentation, placeholders, and dependency notes — or view it ' +
              'in context on <a href="../index.html" target="_blank" rel="noopener">the live site</a> — every page uses it.</p>' +
            '</div>';
          body.appendChild(wrap);
          return;
        }

        copyBtn.style.display = '';
        var tmpl = document.getElementById(entry.template);
        currentRootEls = Array.prototype.slice.call(tmpl.content.children);

        var row = document.createElement('div');
        row.className = 'device-row';
        body.appendChild(row);

        var desk = buildPane({ kind: 'desktop', width: 1280, min: 600, max: 2000, step: 10, play: entry.play,
          placeholder: '.hero h1 { font-size: 60px; }' });
        var mob  = buildPane({ kind: 'mobile', width: 390, min: 320, max: 520, step: 5, play: entry.play,
          placeholder: '.hero-text { padding: 0 16px; }' });
        row.appendChild(desk.el);
        row.appendChild(mob.el);

        extractCurrentCss(currentRootEls).then(function (seeded) {
          if (seeded && mySeq === seq) { desk.seedCss(seeded); mob.seedCss(seeded); }
        });

        copyBtn.onclick = function () {
          var html = currentRootEls.map(function (el) { return el.outerHTML; }).join('\n\n')
            .split('\n').map(function (l) { return l.replace(/^ {4}/, ''); }).join('\n').trim();
          navigator.clipboard.writeText(html).then(function () {
            copyBtn.classList.add('copied'); copyLabel.textContent = 'Copied!';
            setTimeout(function () { copyBtn.classList.remove('copied'); copyLabel.textContent = 'Copy code'; }, 1600);
          });
        };
      }

      document.querySelectorAll('.sidebar-item').forEach(function (btn) {
        btn.addEventListener('click', function () { loadSnippet(btn.getAttribute('data-snippet')); });
      });

      // Refresh = reload the CURRENTLY active snippet only (rebuilds its
      // panes from scratch, discarding any live-CSS edits) — not a full page
      // reload, so you stay exactly where you are.
      refreshBtn.addEventListener('click', function () {
        if (currentId) loadSnippet(currentId);
      });

      // Back/forward navigation between snippets via the hash.
      window.addEventListener('hashchange', function () {
        var id = location.hash.slice(1);
        if (id && REGISTRY[id] && id !== currentId) loadSnippet(id, { fromHash: true });
      });

      // Initial view: honor a snippet name in the URL hash (so refreshing —
      // or sharing a link — returns to the same snippet) and fall back to
      // hero-cone for a bare visit or an unrecognized hash.
      var initialId = location.hash.slice(1);
      loadSnippet((initialId && REGISTRY[initialId]) ? initialId : 'hero-cone', { fromHash: true });
    })();
  </script>

</body>
</html>
